name: release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .app
        run: bash Scripts/build-app.sh "${{ steps.v.outputs.version }}"

      - name: Zip
        id: zip
        run: |
          ZIP="HeeButton-${{ steps.v.outputs.version }}.zip"
          ditto -c -k --keepParent HeeButton.app "$ZIP"
          echo "sha256=$(shasum -a 256 "$ZIP" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create release
        run: gh release create "$GITHUB_REF_NAME" "HeeButton-${{ steps.v.outputs.version }}.zip" --title "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update Homebrew Cask
        run: bash Scripts/update-homebrew-cask.sh "${{ steps.v.outputs.version }}" "${{ steps.zip.outputs.sha256 }}"
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
